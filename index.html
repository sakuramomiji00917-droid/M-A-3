<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Global M&A Simulator - CEO Edition</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@3.9.1"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&family=Noto+Sans+JP:wght@400;700;900&display=swap"
        rel="stylesheet">
    <style>
        /* =========================================
           🎨 全体スタイル・モダンアプリ配色設定
           ========================================= */
        :root {
            --bg: #f3f4f6;
            /* 少し明るいグレーでカードを浮かせる */
            --card-bg: #ffffff;
            --side: #0f172a;
            /* 深いネイビー */
            --side-text: #94a3b8;
            --side-active: #2563eb;
            --text-main: #1e293b;
            --text-mut: #64748b;
            --primary: #2563eb;
            /* 鮮やかなブルー */
            --primary-hover: #1d4ed8;
            --success: #10b981;
            /* エメラルドグリーン */
            --danger: #ef4444;
            /* ローズレッド */
            --warning: #f59e0b;
            /* アンバー */
            --gold: #d97706;
            /* VIPゴールド */
            --border: #e2e8f0;
            --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
            --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
            --radius-md: 12px;
            --radius-lg: 16px;
            --radius-xl: 24px;
        }

        body {
            font-family: 'Inter', 'Noto Sans JP', sans-serif;
            background: var(--bg);
            color: var(--text-main);
            margin: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* 📱 サイドバー (PC版) */
        .sidebar {
            width: 280px;
            background: var(--side);
            color: var(--side-text);
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
            z-index: 50;
            box-shadow: 4px 0 15px rgba(0, 0, 0, 0.1);
            transition: all 0.3s ease;
        }

        .sidebar-header {
            padding: 24px 20px;
            font-size: 22px;
            font-weight: 900;
            color: #ffffff;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            text-align: center;
            letter-spacing: 1px;
            background: linear-gradient(135deg, #1e293b, #0f172a);
        }

        .nav-menu {
            flex: 1;
            overflow-y: auto;
            padding: 20px 15px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .nav-item {
            padding: 12px 16px;
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
            border-radius: 10px;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            align-items: center;
            gap: 12px;
            color: var(--side-text);
        }

        .nav-item:hover {
            background: rgba(255, 255, 255, 0.05);
            color: #ffffff;
            transform: translateX(4px);
        }

        .nav-item.active {
            background: var(--primary);
            color: #ffffff;
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.4);
        }

        .company-summary {
            padding: 20px;
            background: rgba(0, 0, 0, 0.2);
            border-top: 1px solid rgba(255, 255, 255, 0.05);
        }

        .company-summary .val {
            color: #ffffff;
            font-size: 20px;
            font-weight: 900;
            margin-bottom: 12px;
            font-family: 'Inter', sans-serif;
            letter-spacing: -0.5px;
        }

        .sidebar-actions {
            padding: 20px;
            background: rgba(0, 0, 0, 0.3);
        }

        /* 🖥️ メインコンテンツエリア */
        .main-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }

        .content-area {
            flex: 1;
            padding: 30px 40px;
            overflow-y: auto;
            scroll-behavior: smooth;
        }

        .view-section {
            display: none;
            animation: appFadeIn 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        .view-section.active {
            display: block;
        }

        @keyframes appFadeIn {
            from {
                opacity: 0;
                transform: translateY(15px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* 🏆 タイトルと見出し */
        h2 {
            font-size: 28px;
            font-weight: 900;
            margin-top: 0;
            margin-bottom: 24px;
            color: var(--text-main);
            display: flex;
            align-items: center;
            gap: 12px;
            letter-spacing: -0.5px;
        }

        h3 {
            font-size: 18px;
            font-weight: 800;
            color: var(--text-main);
            margin-bottom: 16px;
        }

        /* 🃏 アプリ風カードUI */
        .card {
            background: var(--card-bg);
            border-radius: var(--radius-md);
            padding: 20px;
            border: 1px solid var(--border);
            margin-bottom: 20px;
            box-shadow: var(--shadow-sm);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            position: relative;
            overflow: hidden;
        }

        .card:hover {
            box-shadow: var(--shadow-md);
            transform: translateY(-2px);
        }

        .card-header {
            font-weight: 800;
            font-size: 13px;
            margin-bottom: 15px;
            color: var(--text-mut);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        /* 📱 グリッドシステム */
        .grid-2 {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 20px;
        }

        .grid-3 {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 15px;
        }

        .grid-4 {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 15px;
        }

        /* 📊 ステータスボックス */
        .stat-box {
            background: #f8fafc;
            padding: 20px;
            border-radius: var(--radius-md);
            border: 1px solid var(--border);
            text-align: center;
            position: relative;
        }

        .stat-box .label {
            font-size: 12px;
            color: var(--text-mut);
            margin-bottom: 8px;
            font-weight: 700;
        }

        .stat-box .value {
            font-size: 24px;
            font-weight: 900;
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
        }

        /* 🔘 ボタンのモダン化 */
        button {
            border: none;
            padding: 12px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 700;
            font-size: 14px;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none !important;
        }

        button:active:not(:disabled) {
            transform: scale(0.97);
        }

        .btn-primary {
            background: var(--primary);
            color: #ffffff;
            box-shadow: 0 4px 10px rgba(37, 99, 235, 0.2);
        }

        .btn-primary:hover:not(:disabled) {
            background: var(--primary-hover);
            box-shadow: 0 6px 15px rgba(37, 99, 235, 0.3);
            transform: translateY(-1px);
        }

        .btn-danger {
            background: var(--danger);
            color: #ffffff;
            box-shadow: 0 4px 10px rgba(239, 68, 68, 0.2);
        }

        .btn-warning {
            background: var(--warning);
            color: #ffffff;
        }

        .btn-dark {
            background: var(--text-main);
            color: #ffffff;
        }

        .btn-outline {
            background: transparent;
            border: 2px solid var(--border);
            color: var(--text-mut);
        }

        .btn-outline:hover:not(:disabled) {
            border-color: var(--primary);
            color: var(--primary);
            background: #eff6ff;
        }

        .btn-large {
            width: 100%;
            padding: 16px;
            font-size: 16px;
        }

        /* 🎛️ 入力フォーム・スライダー */
        input[type="text"],
        input[type="number"],
        select {
            padding: 12px 16px;
            border: 2px solid var(--border);
            border-radius: 8px;
            width: 100%;
            box-sizing: border-box;
            font-family: inherit;
            font-size: 15px;
            font-weight: 600;
            color: var(--text-main);
            transition: border-color 0.2s;
            background: #f8fafc;
        }

        input:focus,
        select:focus {
            outline: none;
            border-color: var(--primary);
            background: #fff;
        }

        /* iOS風レンジスライダー */
        input[type=range] {
            -webkit-appearance: none;
            width: 100%;
            background: transparent;
        }

        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 24px;
            width: 24px;
            border-radius: 50%;
            background: #ffffff;
            cursor: pointer;
            margin-top: -8px;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.2);
            border: 2px solid var(--primary);
        }

        input[type=range]::-webkit-slider-runnable-track {
            width: 100%;
            height: 8px;
            cursor: pointer;
            background: #e2e8f0;
            border-radius: 4px;
        }

        /* 📑 丸ピル型タブ */
        .region-tabs {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 24px;
        }

        .tab-btn {
            background: #ffffff;
            border: 2px solid var(--border);
            padding: 10px 20px;
            border-radius: 30px;
            /* 完全な丸み */
            cursor: pointer;
            font-size: 14px;
            font-weight: 700;
            color: var(--text-mut);
            box-shadow: var(--shadow-sm);
        }

        .tab-btn.active {
            background: var(--primary);
            color: #ffffff;
            border-color: var(--primary);
            box-shadow: 0 4px 10px rgba(37, 99, 235, 0.3);
        }

        /* 🪟 グラスモーフィズム・モーダル */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(8px);
            /* すりガラス効果 */
            -webkit-backdrop-filter: blur(8px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 2000;
            padding: 20px;
            animation: fadeIn 0.2s ease-out;
        }

        .modal-content {
            position: relative;
            background: var(--card-bg);
            width: 100%;
            max-width: 550px;
            padding: 30px;
            border-radius: var(--radius-lg);
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            animation: slideUp 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(40px) scale(0.98);
            }

            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .close-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: #f1f5f9;
            color: var(--text-mut);
            font-size: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0;
            margin: 0;
            transition: all 0.2s;
        }

        .close-btn:hover {
            background: #e2e8f0;
            color: var(--text-main);
            transform: rotate(90deg);
        }

        mobile-header {
            display: none;
        }

        /* 📱 スマホ完全対応レスポンシブ (ボトムナビ化) */
        @media (max-width: 800px) {
            body {
                flex-direction: column;
                overflow: visible !important;
                /* 画面全体の固定を解除 */
                height: auto !important;
                padding-bottom: 100px;
            }

            .main-content {
                overflow: visible !important;
                height: auto !important;
                padding: 10px;
            }

            /* ニュースとスタートアップが隠れないように調整 */
            #view-news,
            #view-vc {
                width: 100%;
                display: none;
                /* switchTabでactiveになった時だけ表示 */
            }

            #view-news.active,
            #view-vc.active {
                display: block !important;
            }

            .sidebar {
                width: 100%;
                display: none;
                /* スマホではヘッダー/ボトムナビに分解 */
            }

            /* スマホ用ヘッダー */
            .mobile-header {
                display: flex;
                justify-content: space-between;
                align-items: center;
                background: var(--side);
                color: white;
                padding: 15px 20px;
                position: sticky;
                top: 0;
                z-index: 100;
                box-shadow: var(--shadow-md);
            }

            .mobile-header .cash {
                font-size: 20px;
                font-weight: 900;
                color: #10b981;
            }

            .content-area {
                padding: 20px 15px;
                padding-bottom: 120px !important;
                overflow: visible;
            }

            /* スマホ用ボトムナビゲーション */
            /* スマホ用ボトムナビゲーション */
            .mobile-bottom-nav {
                position: fixed;
                bottom: 0;
                left: 0;
                right: 0;
                background: rgba(255, 255, 255, 0.95);
                backdrop-filter: blur(10px);
                -webkit-backdrop-filter: blur(10px);
                border-top: 1px solid var(--border);
                display: flex;
                justify-content: space-between;
                /* 均等配置 */
                padding: 6px 4px 20px 4px;
                z-index: 1000;
                box-shadow: 0 -4px 15px rgba(0, 0, 0, 0.05);
            }

            .bottom-nav-item {
                display: flex;
                flex-direction: column;
                align-items: center;
                gap: 3px;
                font-size: 9px;
                /* スマホで7つ並べるため小さく */
                font-weight: 800;
                color: var(--text-mut);
                padding: 6px 2px;
                border-radius: 8px;
                width: 14%;
                /* 7等分 */
            }

            .bottom-nav-item span:first-child {
                font-size: 20px !important;
                /* アイコンサイズ */
            }

            .bottom-nav-item.active {
                color: var(--primary);
                background: #eff6ff;
            }

            /* ターン進行フローティングボタン (FAB) */
            .btn-next-turn-fab {
                position: fixed;
                bottom: 90px;
                right: 20px;
                width: 64px;
                height: 64px;
                border-radius: 50%;
                background: var(--primary);
                color: white;
                font-size: 24px;
                display: flex;
                align-items: center;
                justify-content: center;
                box-shadow: 0 10px 25px rgba(37, 99, 235, 0.5);
                z-index: 999;
                transition: transform 0.2s;
            }

            .btn-next-turn-fab:active {
                transform: scale(0.9);
            }

            /* スマホ用カード調整 */
            .grid-2,
            .grid-3,
            .grid-4 {
                grid-template-columns: 1fr;
                gap: 15px;
            }

            .card {
                padding: 15px;
                margin-bottom: 15px;
            }

            h2 {
                font-size: 22px;
                margin-bottom: 15px;
            }
        }

        /* ユーティリティ */
        .text-success {
            color: var(--success) !important;
            font-weight: bold;
        }

        .text-danger {
            color: var(--danger) !important;
            font-weight: bold;
        }

        .flex-between {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        @media (min-width: 801px) {

            .mobile-header,
            .mobile-bottom-nav,
            .btn-next-turn-fab {
                display: none !important;
            }
        }
    </style>
</head>

<body>
    <div id="start-screen"
        style="position: fixed; inset: 0; background: linear-gradient(135deg, #0f172a, #1e293b); z-index: 999999; display: flex; flex-direction: column; justify-content: center; align-items: center; color: #fff;">
        <div style="text-align: center; max-width: 450px; padding: 20px; animation: appFadeIn 0.8s ease-out;">
            <h1 style="font-size: 36px; font-weight: 900; margin: 0 0 5px 0; letter-spacing: 2px;">Global M&A Sim</h1>
            <h2 style="font-size: 16px; font-weight: 800; color: var(--gold); margin: 0 0 40px 0; border: none;">CEO
                Edition</h2>

            <div
                style="margin-bottom: 30px; background: rgba(255, 255, 255, 0.05); padding: 25px; border-radius: var(--radius-lg); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1);">
                <label for="player-company-name-input"
                    style="display: block; margin-bottom: 12px; font-weight: 700; color: #cbd5e1; font-size: 14px;">🏢
                    設立する持株会社の名前</label>
                <input type="text" id="player-company-name-input" placeholder="例：カケル・ホールディングス" value="My Coffee Inc."
                    style="width: 100%; padding: 16px; border: 2px solid transparent; border-radius: 10px; font-size: 20px; text-align: center; color: var(--text-main); font-weight:900; background: #fff;">
            </div>

            <div style="display: flex; flex-direction: column; gap: 15px;">
                <button class="btn-primary" style="padding: 18px; font-size: 18px;" onclick="startNewGame()">🚀 会社を設立する
                    (NEW GAME)</button>
                <button class="btn-outline"
                    style="padding: 16px; font-size: 14px; border-color: rgba(255,255,255,0.2); color: #cbd5e1;"
                    onclick="openLoadFromStart()">💾 続きから (LOAD GAME)</button>
            </div>
        </div>
    </div>

    <div class="mobile-header">
        <div style="font-weight: 900; letter-spacing: 1px; font-size: 18px;">Global M&A</div>
        <div class="cash" id="mobile-disp-cash">¥---</div>
    </div>

    <div class="sidebar">
        <div class="sidebar-header">Global M&A Sim</div>
        <div class="nav-menu">
            <div class="nav-item active" id="nav-stores" onclick="switchTab('stores')"><span
                    style="font-size:18px;">🏪</span> 店舗・価格</div>
            <div class="nav-item" id="nav-world" onclick="switchTab('world')"><span style="font-size:18px;">🌍</span>
                不動産マップ</div>
            <div class="nav-item" id="nav-company" onclick="switchTab('company')"><span
                    style="font-size:18px;">📊</span> 財務・方針</div>
            <div class="nav-item" id="nav-hq" onclick="switchTab('hq')"><span style="font-size:18px;">🏢</span> 本社・R&D
            </div>
            <div class="nav-item" id="nav-subsidiaries" onclick="switchTab('subsidiaries')"><span
                    style="font-size:18px;">🤝</span> 子会社管理</div>
            <div class="nav-item" id="nav-market" onclick="switchTab('market')"><span style="font-size:18px;">📈</span>
                株式市場</div>
            <div class="nav-item" id="nav-vc" onclick="switchTab('vc')"><span style="font-size:18px;">🦄</span> スタートアップ
            </div>
            <div class="nav-item" id="nav-news" onclick="switchTab('news')"><span style="font-size:18px;">📰</span> ニュース
            </div>
        </div>
        <div class="company-summary">
            <div style="color: var(--side-text); font-size: 12px; margin-bottom: 4px; font-weight:700;">現在の時間</div>
            <div class="val" id="disp-week">2020年 1月 1週</div>
            <div
                style="color: var(--side-text); font-size: 12px; margin-bottom: 4px; margin-top: 15px; font-weight:700;">
                手元資金</div>
            <div class="val text-success" id="disp-cash">¥20,000,000</div>
        </div>
        <div class="sidebar-actions">
            <button class="btn-primary btn-large" style="margin-bottom: 15px; background: #3b82f6;"
                onclick="executeTurn()">⏭️ 翌週へ進む</button>
            <div style="display: flex; gap: 10px;">
                <button class="btn-outline"
                    style="flex: 1; padding: 10px; font-size: 12px; border-color: rgba(255,255,255,0.1); color: #cbd5e1;"
                    onclick="openSaveLoadModal('save')">💾 セーブ</button>
                <button class="btn-outline"
                    style="flex: 1; padding: 10px; font-size: 12px; border-color: rgba(255,255,255,0.1); color: #cbd5e1;"
                    onclick="openSaveLoadModal('load')">📂 ロード</button>
            </div>
        </div>
    </div>

    <div class="main-container">
        <div class="content-area" id="main-content-area">
            <div id="view-stores" class="view-section active"></div>
            <div id="view-world" class="view-section"></div>
            <div id="view-company" class="view-section"></div>
            <div id="view-hq" class="view-section"></div>
            <div id="view-subsidiaries" class="view-section"></div>
            <div id="view-market" class="view-section"></div>
            <div id="view-vc" class="view-section"></div>
            <div id="view-news" class="view-section"></div>
        </div>

        <div class="btn-next-turn-fab" onclick="executeTurn()">⏭️</div>
        <div class="mobile-bottom-nav">
            <div class="bottom-nav-item active" id="mob-nav-stores" onclick="switchTab('stores')"><span
                    style="font-size:20px;">🏠</span><span>店舗</span></div>
            <div class="bottom-nav-item" id="mob-nav-world" onclick="switchTab('world')"><span
                    style="font-size:20px;">🌍</span><span>物件</span></div>
            <div class="bottom-nav-item" id="mob-nav-company" onclick="switchTab('company')"><span
                    style="font-size:20px;">📊</span><span>財務</span></div>
            <div class="bottom-nav-item" id="mob-nav-hq" onclick="switchTab('hq')"><span
                    style="font-size:20px;">🏢</span><span>HQ</span></div>
            <div class="bottom-nav-item" id="mob-nav-subsidiaries" onclick="switchTab('subsidiaries')"><span
                    style="font-size:20px;">🤝</span><span>子会社</span></div>

        class Company {
            constructor(id, name, type, cash, sector = 'coffee', initialPrice = 100, isPublic = true, shares = 10000) {
                this.id = id; this.name = name; this.type = type; this.sector = sector;
                this.cash = cash; this.debt = 0;
                this.stockPrice = initialPrice; this.shares = shares;
                this.stores = []; this.isBankrupt = false; this.isPublic = isPublic;
                this.shareholders = {}; this.playerTotalCost = 0; this.lastDividendPerShare = 0;
                this.color = id === 'player' ? '#2563eb' : `hsl(${Math.floor(Math.random() * 360)}, 70%, 50%)`;
                if (id === 'player') this.shareholders['player'] = shares;

                // 🌟 追加：R&D ＆ 銀行格付け用
                this.unlockedMenus = ["m1"];
                this.creditRating = "B"; // AAA, AA, A, B, C, D
            }
            get marketCap() { return this.stockPrice * this.shares; }
            get creditLimit() {
                let base = Math.max(1, this.stores.length) * 10000000 + 10000000;
                if (this.creditRating === "AAA") return base * 5;
                if (this.creditRating === "AA") return base * 3;
                if (this.creditRating === "A") return base * 2;
                if (this.creditRating === "C") return base * 0.5;
                if (this.creditRating === "D") return 0;
                return base;
            }
        }

        window.executeTurn = function () {
            if (isGameOver) return;
            week++;

            // ターン開始時に投票キューをリセット
            window.activeVotingQueue = [];

            // 🏦 【新規】銀行金利の初期化と変動メカニズム
            let banks = companies.filter(c => c.sector === 'bank' || c.sector === 'finance' || c.name.includes('銀行'));
            banks.forEach(b => {
                if (b.depositRate === undefined) {
                    b.depositRate = 0.0005 + (Math.random() * 0.001); b.loanRate = b.depositRate + 0.002 + (Math.random() * 0.003);
                } else {
                    let cashRatio = b.cash / (b.marketCap || 1);
                    if (cashRatio > 0.5) { b.depositRate = Math.max(0.0001, b.depositRate - 0.00005); b.loanRate = Math.max(0.001, b.loanRate - 0.00005); }
                    else if (cashRatio < 0.1) { b.depositRate = Math.min(0.003, b.depositRate + 0.0001); b.loanRate = Math.min(0.01, b.loanRate + 0.0001); }
                }
            });

            // 🌟 【新規】初回限定セットアップ（強制預金、初期店舗保証、不動産割当）
            if (!window.economyInitialized_v2) {
                let reCos = companies.filter(c => c.sector === 'realestate' || c.sector === '不動産');
                let bestBank = banks.length > 0 ? banks.reduce((a, b) => a.depositRate > b.depositRate ? a : b) : null;

                // 🏢 【修正】不動産の初回割り当てを国籍（国コード）に一致させる
                if (reCos.length > 0) {
                    Object.keys(globalNetworkData).forEach(rk => {
                        let cMap = { 'TOKYO': 'JP', 'OSAKA': 'JP', 'USA': 'USA', 'CHINA': 'CHINA', 'UK': 'UK', 'KOREA': 'KOREA', 'AUSTRALIA': 'AUS', 'CANADA': 'CAN', 'FRANCE': 'FRA', 'GERMANY': 'GER', 'INDIA': 'IND' };
                        let targetCountry = cMap[rk];
                        // その国の不動産会社を抽出（なければ世界全体から）
                        let localReCos = reCos.filter(c => c.country === targetCountry);
                        let fallbackCos = localReCos.length > 0 ? localReCos : reCos;

                        globalNetworkData[rk].districts.forEach(d => {
                            d.properties.forEach(p => {
                                if (!p.owner && p.coffeeTenant !== 1) p.owner = fallbackCos[Math.floor(Math.random() * fallbackCos.length)].id;
                            });
                        });

                            <div id="disp-player-deposit-label" style="font-size:12px; color:var(--text-mut); font-weight:bold; margin-bottom:5px;">現在の預金残高</div>
                            <div id="disp-player-deposit" style="font-size:24px; font-weight:900; color:var(--success);">¥0</div>
                        </div>
                        <div style="background:#fff; padding:15px; border-radius:8px; border:1px solid var(--border); text-align:center;">
                            <div id="disp-player-debt-label" style="font-size:12px; color:var(--text-mut); font-weight:bold; margin-bottom:5px;">現在の借入残高</div>

                            <button class="btn-outline" style="flex:1; border-color:var(--success); color:var(--success);" onclick="executeBankAction('withdraw')">引き出す</button>
                        </div>
                        <div style="display:flex; gap:10px;">
                            <button class="btn-primary" style="flex:1; background:var(--danger);" onclick="executeBankAction('borrow')">借り入れる</button>
                            <button class="btn-outline" style="flex:1; border-color:var(--danger); color:var(--danger);" onclick="executeBankAction('repay')">返済する</button>
                        </div>
                    </div>
                </div>
                <h3>⚙️ アクション</h3>
                <div class="grid-2" style="margin-bottom:30px;">
                    ${!p.isPublic ? `<div class="card" style="border: 2px solid var(--warning); background:#fffbeb;"><div class="card-header" style="color:var(--gold);">🔔 IPO (新規上場)</div><button class="btn-warning btn-large" style="font-weight:900;" onclick="goPublic()">市場に上場する (費用: ¥5,000万)</button></div>` : ''}
                    <div class="card"><div class="card-header">💰 配当性向 (%)</div><div style="font-size:24px; font-weight:900; color:var(--primary); text-align:center; margin-bottom:10px;"><span id="disp-div-rate">${p.dividendRate || 0}</span>%</div><input type="range" min="0" max="100" value="${p.dividendRate || 0}" oninput="document.getElementById('disp-div-rate').innerText=this.value" onchange="updateDivRateFinal(this.value)"></div>
                    <div class="card"><div class="card-header">🏛️ 政治献金 (ロビー)</div><div style="display:flex; gap:10px; margin-bottom:10px;"><input type="number" id="lobby-input" value="5000" step="1000" style="flex:1;"><b>万円</b></div><button class="btn-dark btn-large" onclick="doLobbying()">献金して減税(10%)を獲得</button></div>
                    <div class="card" style="grid-column: 1 / -1;"><div class="card-header">📈 公募増資 (自社株発行)</div><div style="display:flex; gap:20px; align-items:center;"><div style="flex:1;"><label style="font-weight:bold; font-size:14px;">発行比率: <span id="dilution-range-val" class="text-success">10</span>%</label><input type="range" id="dilution-range" min="5" max="30" step="5" value="10" oninput="document.getElementById('dilution-range-val').innerText=this.value;"></div><button class="btn-primary" style="padding:15px 30px;" onclick="executePlayerDilution()" ${p.lastDilutionWeek && (week - p.lastDilutionWeek) < 48 ? 'disabled' : ''}>新株を発行して資金調達</button></div></div>
                </div>
                <h3>🏢 所有ビル一覧</h3>
                <div class="grid-3">${myProps.map(pr => `<div class="card" style="margin:0;"><div style="font-weight:900; margin-bottom:8px;">${pr.name}</div><div style="font-size:12px; color:var(--text-mut); margin-bottom:10px;">時価: <b class="text-success">¥${(pr.currentValue / 10000).toLocaleString()}万</b><br>家賃収入: <b>+¥${pr.rentIncome.toLocaleString()}/週</b></div><button class="btn-outline text-danger" style="width:100%; padding:8px;" onclick="sellBuildingFromPortfolio('${pr.rk}','${pr.distName}',${pr.idx},${pr.currentValue})">売却</button></div>`).join('') || '<div style="grid-column:1/-1; text-align:center; padding:20px; color:var(--text-mut);">所有物件なし</div>'}</div>
            `;
            setTimeout(updateBankUI, 10);
        };

        // 🏦 銀行機能のロジック
        // 🏦 銀行UI更新（純粋な表示のみ）
        window.updateBankUI = function () {
            let p = companies[0];
            let selectEl = document.getElementById('player-bank-selector');
            if (!selectEl) return;
            let currentBankId = selectEl.value;
            let b = companies.find(x => x.id === currentBankId);
            if (!b) return;

            let currentDep = p.deposits ? (p.deposits[currentBankId] || 0) : 0;
            let currentDebt = p.bankDebts ? (p.bankDebts[currentBankId] || 0) : 0;
            let dRate = ((b.depositRate || 0.001) * 100).toFixed(2);
            let lRate = ((b.loanRate || 0.005) * 100).toFixed(2);

            document.getElementById('disp-player-deposit').innerText = `¥${currentDep.toLocaleString()}`;
            document.getElementById('disp-player-debt').innerText = `¥${currentDebt.toLocaleString()}`;
            document.getElementById('disp-player-deposit-label').innerText = `現在の預金残高 (週利+${dRate}%)`;
            document.getElementById('disp-player-debt-label').innerText = `現在の借入残高 (週利-${lRate}%)`;
        };

        // 🏦 銀行変更のトリガー（ここだけでアラート判定を行う）
        window.handleBankChangeTrigger = function (newBankId) {
            let p = companies[0];
            if (p.mainBankId && p.mainBankId !== newBankId) {
                let elapsed = week - (p.lastBankChangeWeek || 0);
                if (elapsed < 48) {
                    alert(`【銀行規制】メインバンクの変更は1年に1回までです。\n現在の銀行との契約満了まで、あと ${48 - elapsed}週 待つ必要があります。`);
                    document.getElementById('player-bank-selector').value = p.mainBankId; // 強制的に戻す
                    return;
                }
            }
            updateBankUI();
        };

        window.executeBankAction = function (action) {
            let p = companies[0];
            let selectEl = document.getElementById('player-bank-selector');
            if (!selectEl || !selectEl.value) { alert("取引する銀行を選択してください。"); return; }
            let bankId = selectEl.value;

            // 🌟 初めての取引、または期限が切れて別の銀行で取引した瞬間に契約をロック
            if (p.mainBankId !== bankId) {
                p.mainBankId = bankId;
                p.lastBankChangeWeek = week;
                addLog(`【金融】${companies.find(c => c.id === bankId).name.replace(/\[.*?\]\s*/, '')} と正式な1年間のメインバンク契約を締結しました。`, 'news', '財務');
                renderPortfolio();
            }

            let bankCo = companies.find(c => c.id === bankId);
            let amountInput = document.getElementById('bank-amount-input');
            let amount = parseInt(amountInput.value) * 10000;

            if (!bankCo || isNaN(amount) || amount <= 0) return;
            if (!p.deposits) p.deposits = {}; if (!p.bankDebts) p.bankDebts = {};
            let currentDep = p.deposits[bankId] || 0; let currentDebt = p.bankDebts[bankId] || 0;

            if (action === 'deposit') {
                if (p.cash < amount) { alert("手元資金が足りません。"); return; }
                p.cash -= amount; p.deposits[bankId] = currentDep + amount; bankCo.cash += amount;
                addLog(`【預金】${bankCo.name.replace(/\[.*?\]\s*/, '')} に ¥${amount.toLocaleString()} を預け入れました。`, 'success', '財務');
            } else if (action === 'withdraw') {
                if (currentDep < amount) { alert("預金残高が足りません。"); return; }
                p.cash += amount; p.deposits[bankId] = currentDep - amount; bankCo.cash -= amount;
                addLog(`【引出】${bankCo.name.replace(/\[.*?\]\s*/, '')} から ¥${amount.toLocaleString()} を引き出しました。`, 'normal', '財務');
            } else if (action === 'borrow') {
                let creditLimit = Math.max(1, p.stores.length) * 50000000;
                if (p.creditRating === "AAA") creditLimit *= 5; else if (p.creditRating === "AA") creditLimit *= 3; else if (p.creditRating === "A") creditLimit *= 2;
                if (currentDebt + amount > creditLimit) { alert(`【融資審査落ち】信用枠（上限: ¥${creditLimit.toLocaleString()}）を超えています。`); return; }
                p.cash += amount; p.bankDebts[bankId] = currentDebt + amount; bankCo.cash -= amount;
                addLog(`【借入】${bankCo.name.replace(/\[.*?\]\s*/, '')} から ¥${amount.toLocaleString()} を借入しました。`, 'alert', '財務');
            } else if (action === 'repay') {
                if (currentDebt === 0) { alert("借入はありません。"); return; }
                let repayAmount = Math.min(amount, currentDebt);
                if (p.cash < repayAmount) { alert("資金が足りません。"); return; }
                p.cash -= repayAmount; p.bankDebts[bankId] = currentDebt - repayAmount; bankCo.cash += repayAmount;
                addLog(`【返済】${bankCo.name.replace(/\[.*?\]\s*/, '')} へ ¥${repayAmount.toLocaleString()} を返済しました。`, 'success', '財務');
            }
            updateBankUI(); updateDashboard();
        };
        window.updateDivRateFinal = function (val) { companies[0].dividendRate = parseInt(val); };
        window.doLobbying = function () {
            let amt = parseInt(document.getElementById('lobby-input').value) * 10000;
            if (isNaN(amt) || companies[0].cash < amt || amt < 10000000) return alert('資金不足または1000万未満です');
            companies[0].cash -= amt; playerLobbyBonusTurns += Math.floor(amt / 5000000);
            addLog(`【政治】献金により特別減税を獲得！`, 'success', '政治'); updateDashboard(); renderPortfolio();
        };
        window.handleBank = function (action) {
            let amt = parseInt(document.getElementById('bank-input').value) * 10000, p = companies[0];
            if (isNaN(amt) || amt <= 0) return;
            if (action === 'borrow') {
                if (p.debt + amt > p.creditLimit) return alert('与信枠オーバーです！');
                p.cash += amt; p.debt += amt;
            } else {
                let r = Math.min(amt, p.debt); if (p.cash < r) return alert('現金不足');
                p.cash -= r; p.debt -= r;
            }
            updateDashboard(); renderPortfolio();
        };
        window.defendStock = function () {
            let p = companies[0], cost = p.stockPrice * 100;
            if (p.cash < cost) return alert('資金不足');
            for (let id in p.shareholders) {
                if (id !== 'player' && p.shareholders[id] >= 100) {
                    p.shareholders[id] -= 100; p.shareholders['player'] += 100; p.cash -= cost;
                    addLog(`【防衛】自社株100株を買い戻しました`, 'success', '自社'); break;
                }
            }
            updateDashboard(); renderPortfolio();
        };
        window.executePlayerDilution = function () {
            let p = companies[0], ratio = parseInt(document.getElementById('dilution-range').value);
            if (confirm(`${ratio}% の新株を発行しますか？株価は下がります。`)) { executeCompanyDilution(p, ratio); renderPortfolio(); updateDashboard(); }
        };
        window.executeCompanyDilution = function (c, rPct) {
            let ns = Math.floor(c.shares * (rPct / 100)), amt = Math.floor(c.stockPrice * ns), fee = Math.floor(amt * 0.05);
            c.cash += (amt - fee); c.shares += ns; c.stockPrice = Math.max(10, Math.floor(c.stockPrice / (1 + (rPct / 100)))); c.lastDilutionWeek = week;
        };
        window.goPublic = function () {
            let p = companies[0]; if (p.cash < 50000000 || !confirm("5000万で上場しますか？")) return;
            p.cash -= 50000000; p.isPublic = true; p.stockPrice = Math.max(100, Math.floor(p.marketCap / p.shares));
            stockHistory.datasets['player'] = Array(stockHistory.labels.length).fill(p.stockPrice);
            addLog(`【祝】自社が上場しました！`, 'success', '自社'); updateDashboard(); renderPortfolio();
        };
        window.sellBuildingFromPortfolio = function (rk, distName, idx, currentVal) {
            if (typeof sellBuilding === 'function') { sellBuilding(rk, distName, idx, currentVal); setTimeout(renderPortfolio, 100); }
        };
        // ==========================================
        // 📈 補完：タブ⑤ 株式市場とM&A（TOB機能含む）
        // ==========================================
        window.updateMarket = function () {
            let container = document.getElementById('view-market'); if (!container) return;

            let topCos = companies.filter(c => c.sector === 'coffee' && c.isPublic).slice(0, 5);
            let sparklineHtml = `<div style="display:flex; gap:15px; overflow-x:auto; padding-bottom:15px; margin-bottom:20px;">`;
            topCos.forEach(c => {
                let hist = (stockHistory.datasets && stockHistory.datasets[c.id]) ? stockHistory.datasets[c.id] : [c.stockPrice];
                let prevP = hist.length > 1 ? hist[hist.length - 2] : c.stockPrice;
                let diff = c.stockPrice - prevP;
                let diffPct = prevP > 0 ? (diff / prevP) * 100 : 0;
                let isUp = diff >= 0;
                let colorClass = isUp ? 'var(--success)' : 'var(--danger)';
                let sign = isUp ? '+' : '';

                // 🌟 ミニチャートの上に「現在株価」と「前週比(%)」を追加
                sparklineHtml += `<div class="card" style="min-width:180px; flex:1; padding:15px; cursor:pointer;" onclick="openCompanyModal('${c.id}')">
                    <div class="flex-between" style="margin-bottom:5px;">
                        <div style="font-size:13px; font-weight:900; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; max-width:65%;">${c.name.replace(/\[.*?\]\s*/, '')}</div>
                        <div style="font-size:12px; font-weight:900; color:${colorClass}; background:${isUp ? '#ecfdf5' : '#fef2f2'}; padding:2px 6px; border-radius:6px;">${sign}${diffPct.toFixed(2)}%</div>
                    </div>
                    <div style="font-size:18px; font-weight:900; margin-bottom:10px; color:var(--text-main);">¥${c.stockPrice.toLocaleString()}</div>
                    <div style="height:45px; position:relative;"><canvas id="spark-${c.id}"></canvas></div>
                </div>`;
            });
            sparklineHtml += `</div>`;

            let sectorTabs = `<div class="region-tabs" style="margin-bottom:20px;">` +
                Object.keys(sectors).map(s => `<button class="tab-btn ${s === currentMarketSector ? 'active' : ''}" onclick="currentMarketSector='${s}';updateMarket()">${sectors[s].n}</button>`).join('') + `</div>`;

            let tCos = companies.filter(c => c.sector === currentMarketSector && c.isPublic && !c.isBankrupt);
            let listHtml = `<div class="card" style="padding:0; overflow:hidden;"><table style="width:100%; border-collapse:collapse;">
                <thead style="background:#f8fafc; font-size:11px; color:var(--text-mut);"><tr><th style="text-align:left; padding:15px;">企業名 / 支配構造</th><th style="text-align:right; padding:15px;">時価総額 / 株価</th><th style="text-align:right; padding:15px;">保有 / 損益</th><th style="text-align:center; padding:15px;">取引</th></tr></thead><tbody>`;

            listHtml += tCos.map(c => {
                let o = c.shareholders['player'] || 0;
                let pVal = o > 0 ? (c.stockPrice * o - c.playerTotalCost) : 0;
                let pPct = o > 0 ? (pVal / c.playerTotalCost) * 100 : 0;

                let hist = (stockHistory.datasets && stockHistory.datasets[c.id]) ? stockHistory.datasets[c.id] : [c.stockPrice];
                let prevP = hist.length > 1 ? hist[hist.length - 2] : c.stockPrice;
                let diffPct = prevP > 0 ? ((c.stockPrice - prevP) / prevP) * 100 : 0;
                let priceColor = c.stockPrice >= prevP ? 'var(--success)' : 'var(--danger)';
                let sign = c.stockPrice >= prevP ? '+' : '';

                // 🌟 株主バッジの表示数を上位「5社」に拡大 ＆ 折り返し時の余白調整
                let topHolders = Object.keys(c.shareholders).map(hid => {
                    let comp = companies.find(cp => cp.id === hid);
                    return { n: comp?.name.replace(/\[.*?\]\s*/, '').substring(0, 8) || '市場', v: c.shareholders[hid], color: comp?.color || '#94a3b8' };
                }).sort((a, b) => b.v - a.v).slice(0, 5);

                let holderTags = topHolders.map(h => `<span style="background:${h.color}22; color:${h.color}; border:1px solid ${h.color}44; padding:2px 6px; border-radius:4px; font-size:10px; font-weight:900; margin-right:4px; margin-bottom:4px; display:inline-block;">${h.n} ${((h.v / c.shares) * 100).toFixed(1)}%</span>`).join('');
                return `<tr style="border-bottom:1px solid var(--border); transition:0.2s;" onmouseover="this.style.backgroundColor='#f8fafc'" onmouseout="this.style.backgroundColor='transparent'">
                    <td style="padding:15px;">
                        <div style="font-weight:900; font-size:15px; color:var(--text-main); margin-bottom:6px; cursor:pointer;" onclick="openCompanyModal('${c.id}')">${c.name} 📊</div>
                        <div style="display:flex; flex-wrap:wrap;">${holderTags || '<span style="font-size:10px; color:#ccc;">浮動株多数</span>'}</div>
                    </td>
                    <td style="text-align:right; padding:15px;">
                        <div style="font-size:11px; color:var(--text-mut);">¥${(c.marketCap >= 100000000 ? (c.marketCap / 100000000).toFixed(1) + '億' : (c.marketCap / 10000).toLocaleString() + '万')}</div>
                        <div style="font-size:16px; font-weight:900; color:${priceColor};">¥${c.stockPrice.toLocaleString()} <span style="font-size:11px;">(${sign}${diffPct.toFixed(1)}%)</span></div>
                    </td>
                    <td style="text-align:right; padding:15px;">
                        <div style="font-weight:900; font-size:14px;">${o.toLocaleString()} 株</div>
                        ${o > 0 ? `<span style="font-size:11px; font-weight:bold; color:${pVal >= 0 ? 'var(--success)' : 'var(--danger)'};">${pVal >= 0 ? '+' : ''}${pPct.toFixed(1)}%</span>` : '-'}
                    </td>
                    <td style="text-align:center; padding:15px;">
                        <button class="btn-primary" style="padding:8px 16px; font-size:12px; border-radius:20px;" onclick="openTradeModal('${c.id}')">買収 / TOB</button>
                    </td>
                </tr>`;
            }).join('') || '<tr><td colspan="4" style="text-align:center; padding:40px; color:var(--text-mut); font-weight:bold;">このセクターに企業はありません</td></tr>';

            listHtml += `</tbody></table></div>`;

            container.innerHTML = `<div class="flex-between" style="margin-bottom:24px; border-bottom:3px solid var(--primary); padding-bottom:12px;"><h2 style="margin:0;">📈 世界株式市場</h2><button class="btn-dark" style="font-size:12px; padding:8px 16px;" onclick="showRankingModal()">🏆 ランキング</button></div>${sparklineHtml}${sectorTabs}${listHtml}`;

            window.miniChartInstances = window.miniChartInstances || {};
            setTimeout(() => {
                topCos.forEach(c => {
                    let ctx = document.getElementById(`spark-${c.id}`)?.getContext('2d'); if (!ctx) return;
                    if (window.miniChartInstances[c.id]) window.miniChartInstances[c.id].destroy();

                    let history = (stockHistory.datasets && stockHistory.datasets[c.id]) ? stockHistory.datasets[c.id] : [c.stockPrice];
                    if (history.length <= 2) { history = [Math.floor(c.stockPrice * 0.96), Math.floor(c.stockPrice * 1.03), c.stockPrice]; }
                    let recentData = history.slice(-20);

                    let prevPrice = recentData.length > 1 ? recentData[recentData.length - 2] : recentData[0];
                    let currentPrice = recentData[recentData.length - 1];
                    let isUp = currentPrice >= prevPrice;

                    let lineColor = isUp ? '#10b981' : '#ef4444';

                    let gradient = ctx.createLinearGradient(0, 0, 0, 45);
                    gradient.addColorStop(0, lineColor + '66');
                    gradient.addColorStop(1, lineColor + '00');

                    let minVal = Math.min(...recentData);
                    let maxVal = Math.max(...recentData);
                    let padding = (maxVal - minVal) * 0.1 || minVal * 0.01;

                    window.miniChartInstances[c.id] = new Chart(ctx, {
                        type: 'line',
                        data: {
                            labels: recentData.map((_, i) => i + "週前"),
                            datasets: [{
                                data: recentData,
                                borderColor: lineColor,
                                borderWidth: 2,
                                pointRadius: 0,
                                pointHoverRadius: 5, // 🌟 ホバー時のドット表示
                                pointHoverBackgroundColor: lineColor,
                                fill: true,
                                backgroundColor: gradient,
                                tension: 0.4
                            }]
                        },
                        options: {
                            responsive: true,
                            maintainAspectRatio: false,
                            interaction: { mode: 'index', intersect: false },
                            plugins: {
                                legend: { display: false },
                                tooltip: { // 🌟 ツールチップの復活とスタイリング
                                    enabled: true,
                                    mode: 'index',
                                    intersect: false,
                                    backgroundColor: 'rgba(15, 23, 42, 0.9)',
                                    titleFont: { size: 11, family: "'Inter', sans-serif" },
                                    bodyFont: { size: 13, weight: 'bold', family: "'Inter', sans-serif" },
                                    displayColors: false,
                                    callbacks: { label: function (context) { return '¥' + context.parsed.y.toLocaleString(); } }
                                }
                            },
                            scales: {
                                x: { display: false },
                                y: { display: false, min: minVal - padding, max: maxVal + padding }
                            },
                            animation: { duration: 0 }
                        }
                    });
                });
            }, 50);
        };

        window.openTradeModal = function (id) {
            tradingCompanyId = id; let c = companies.find(x => x.id === id), p = companies[0], o = c.shareholders['player'] || 0;
            let debt = c.debtToPlayer || 0; // 🌟 貸付残高を取得

            let modalsArea = document.getElementById('modals-area');
            let modal = document.getElementById('trade-modal');

            if (modal) modal.remove(); // 🌟 古いモーダルを削除してタブを作り直す

            if (modalsArea) {
                modalsArea.insertAdjacentHTML('beforeend', `

        // 🌟 新機能：タブ切り替え処理
        window.switchTradeTab = function (tab) {
            document.getElementById('trade-tab-stock').style.display = tab === 'stock' ? 'block' : 'none';
            document.getElementById('trade-tab-loan').style.display = tab === 'loan' ? 'block' : 'none';

            let btnStock = document.getElementById('tab-btn-stock');
            let btnLoan = document.getElementById('tab-btn-loan');

            if (tab === 'stock') {
                btnStock.style.background = 'var(--primary)'; btnStock.style.color = '#fff';
                btnLoan.style.background = '#fffbeb'; btnLoan.style.color = 'var(--gold)';
            } else {
                btnStock.style.background = '#fff'; btnStock.style.color = 'var(--text-mut)';
                btnLoan.style.background = 'var(--warning)'; btnLoan.style.color = '#fff';
            }
        };

        window.setTradeMode = function (m) {
            tradeMode = m;
            document.getElementById('btn-trade-buy-mode').className = m === 'buy' ? 'btn-primary' : 'btn-outline';
            document.getElementById('btn-trade-sell-mode').className = m === 'sell' ? 'btn-danger' : 'btn-outline';
            document.getElementById('trade-estimate-label').innerText = m === 'buy' ? '必要資金:' : '受取額:';
            calcTrade();
        };

        window.calcTrade = function () { document.getElementById('trade-estimate-total').innerText = `¥${(companies.find(x => x.id === tradingCompanyId).stockPrice * (parseInt(document.getElementById('trade-amount').value) || 0)).toLocaleString()}`; };

        window.setTradeMax = function () {
            let c = companies.find(x => x.id === tradingCompanyId), p = companies[0];
            if (tradeMode === 'buy') {
                let avail = Math.max(0, c.shares - Object.values(c.shareholders).reduce((x, y) => x + y, 0));
                document.getElementById('trade-amount').value = Math.min(avail, Math.floor(p.cash / c.stockPrice));
            } else { document.getElementById('trade-amount').value = c.shareholders['player'] || 0; }
            calcTrade();
        };

        window.executeTrade = function () {
            let a = parseInt(document.getElementById('trade-amount').value), c = companies.find(x => x.id === tradingCompanyId), p = companies[0], cost = c.stockPrice * a;
            if (isNaN(a) || a <= 0) return;
            if (tradeMode === 'buy') {
                if (p.cash < cost) return alert("資金不足です！");
                if (Object.values(c.shareholders).reduce((x, y) => x + y, 0) + a > c.shares) return alert("市場に出回っている株が不足しています。");

                let currentOwned = c.shareholders['player'] || 0;
                let newRatio = (currentOwned + a) / c.shares;
                // 市場直接買付は40%未満に制限
                if (newRatio >= 0.40 && c.id !== 'player') return alert("【法規制】市場での直接買付は発行済株式の40%未満に制限されています。\n過半数を取得して買収するには「TOB (公開買付)」を宣言してください。");

                p.cash -= cost; c.shareholders['player'] = currentOwned + a; c.playerTotalCost += cost;
                addLog(`市場で ${c.name.replace(/\[.*?\]\s*/, '')} を ${a.toLocaleString()}株 購入しました。`, 'normal', 'M&A');
            } else {
                let o = c.shareholders['player'] || 0; if (o < a) return alert("保有株数が不足しています。");
                let profitPerShare = c.stockPrice - (c.playerTotalCost / o);
                window.weeklyStockSaleProfit = (window.weeklyStockSaleProfit || 0) + (profitPerShare * a);

                p.cash += cost; c.playerTotalCost -= (c.playerTotalCost / o) * a; c.shareholders['player'] -= a;
                if (c.shareholders['player'] === 0) c.playerTotalCost = 0;
                addLog(`保有する ${c.name.replace(/\[.*?\]\s*/, '')} を ${a.toLocaleString()}株 売却しました。`, 'normal', 'M&A');
            }
            closeModal('trade-modal'); updateDashboard(); renderPortfolio();
        };

        window.declareTOB = function () {
            let c = companies.find(x => x.id === tradingCompanyId), p = companies[0];
            if (c.parent === 'player') return alert("すでに自社の子会社です。");
            if (c.id === 'player') return;

            let premiumPrice = Math.floor(c.stockPrice * 1.3), targetShares = Math.floor(c.shares * 0.51) + 1;
            let sharesToBuy = Math.max(0, targetShares - (c.shareholders['player'] || 0));

            if (sharesToBuy === 0) {
                c.parent = 'player';
                addLog(`【買収完了】${c.name.replace(/\[.*?\]\s*/, '')} を子会社化しました！`, 'success', 'M&A');
                closeModal('trade-modal'); updateDashboard(); return;
            }

            if (confirm(`【TOB宣言】\n${c.name.replace(/\[.*?\]\s*/, '')} を プレミアム価格 ¥${premiumPrice.toLocaleString()}/株 で公開買付します。\n\n予想買収総額: 約 ¥${(premiumPrice * sharesToBuy).toLocaleString()}\n※買収は「2週間後」に確定します。相手がポイズンピル（新株発行）で抵抗するリスクがあります。\nよろしいですか？`)) {
                c.activeTOB = { bidder: 'player', price: premiumPrice, targetShares: sharesToBuy, startWeek: week, deadline: week + 2 };
                addLog(`【TOB開始】自社が ${c.name.replace(/\[.*?\]\s*/, '')} に対して敵対的TOBを宣言！（決着まで2週）`, 'alert', 'M&A');
                c.stockPrice = premiumPrice;
                closeModal('trade-modal'); updateDashboard();
            }
        };

        // ==========================================
        // 🌟 新機能ロジック：融資実行 と DES（株式転換）
        // ==========================================
        window.executeLending = function () {
            let c = companies.find(x => x.id === window.tradingCompanyId), p = companies[0];
            let amt = parseInt(document.getElementById('loan-amount-input').value) * 10000;
            if (isNaN(amt) || amt <= 0) return alert("正しい金額を入力してください。");
            if (p.cash < amt) return alert("資金が不足しています！");

            if (confirm(`${c.name.replace(/\[.*?\]\s*/, '')} に対して ¥${(amt / 10000).toLocaleString()}万 を融資しますか？\n（毎週1%の利息が自動で手に入ります）`)) {
                p.cash -= amt;
                c.cash += amt;
                c.debtToPlayer = (c.debtToPlayer || 0) + amt; // 借金残高を増やす
                addLog(`【融資】${c.name.replace(/\[.*?\]\s*/, '')} に ¥${(amt / 10000).toLocaleString()}万 を貸し付けました。`, 'success', '経済');
                closeModal('trade-modal'); updateDashboard();
            }
        };

        window.executeDebtEquitySwap = function () {
            let c = companies.find(x => x.id === window.tradingCompanyId), p = companies[0];
            let debt = c.debtToPlayer || 0;
            if (debt <= 0) return;

            // 20%ディスカウントで株式を強制発行させる
            let swapPrice = Math.max(10, Math.floor(c.stockPrice * 0.8));
            let sharesToGet = Math.floor(debt / swapPrice);

            if (confirm(`【デット・エクイティ・スワップ (DES) 実行】\n貸付残高 ¥${debt.toLocaleString()} を放棄し、代わりに相手の株式を取得します。\n\n転換価格: ¥${swapPrice.toLocaleString()} (市場の20%引)\n取得株数: ${sharesToGet.toLocaleString()} 株\n\n本当に実行しますか？`)) {
                c.debtToPlayer = 0; // 借金帳消し
                c.shares += sharesToGet; // 新株発行（相手の株が希薄化）
                c.shareholders['player'] = (c.shareholders['player'] || 0) + sharesToGet; // あなたの持株が増える
                c.playerTotalCost += debt;

                // 新株発行により株価が下がる
                c.stockPrice = Math.max(10, Math.floor(c.marketCap / c.shares));

                addLog(`【DES実行】債権を株式に転換し、${c.name.replace(/\[.*?\]\s*/, '')} の株式 ${sharesToGet.toLocaleString()} 株を取得しました！`, 'alert', 'M&A');

                // もし過半数を握ったら子会社化
                if (c.shareholders['player'] > c.shares * 0.5) {
                    c.parent = 'player';
                    c.name = `[自社傘下] ${c.name.replace(/\[.*?\]\s*/, '')}`;
                    addLog(`【支配】過半数の株式を取得し、子会社化しました！`, 'success', 'M&A');
                }
                closeModal('trade-modal'); updateDashboard(); updateMarket();
            }
        };

            });
            listArea.innerHTML = html + `</div>`;
        };

        // 🌟 価格更新 ＆ バイト人数の増減関数
        window.updateStorePrice = function (storeId, newPrice) {
            let st = companies[0].stores.find(s => s.id == storeId);
            if (st) { st.price = parseInt(newPrice); addLog(`【戦略】${st.name}の価格を ¥${st.price} に変更しました。`, 'normal', '店舗'); }

        window.updateStaff = function (storeId, delta) {
            let st = companies[0].stores.find(s => s.id == storeId);

        // ==========================================
        // 🌐 フェーズ 2：インフラ契約と資金還流ロジック

        // 1. インフラ契約先の初期化（未設定ならランダムに設定）
        // 1. インフラ契約先の初期化（未設定ならランダムに設定）
        function ensureContracts() {
            let p = companies[0];
            // 🌟 保険データは最初から空のオブジェクト（{}）にしてnullエラーを防ぐ
            if (!p.contracts) p.contracts = { logistics: null, it: null, insurance: {} };
            if (!p.contracts.insurance || typeof p.contracts.insurance !== 'object') p.contracts.insurance = {};

            ['logistics', 'it'].forEach(sec => {
                if (!p.contracts[sec]) {
                    let candidates = companies.filter(c => c.sector === sec);
                    if (candidates.length > 0) {
                        p.contracts[sec] = candidates[Math.floor(Math.random() * candidates.length)].id;
                    }
                }
            });
        }

        // 2. HQビューの拡張：既存のHQ画面にインフラ契約UIを割り込ませる
        const originalUpdateHQView = window.updateHQView;
        window.updateHQView = function () {
            originalUpdateHQView(); // 既存のHQ画面をまず描画
            ensureContracts();

            let container = document.getElementById('view-hq');
            if (!container || !window.playerHQ) return; // 本社が設立されていない場合は処理しない

            let p = companies[0];
            let numStores = p.stores.length;

            // インフラ各セクターの選択肢UI生成
            const buildSelect = (secKey, icon, label, costPerStore) => {
                let candidates = companies.filter(c => c.sector === secKey);
                let options = candidates.map(c => {
                    let isSub = c.parent === 'player';
                    let prefix = isSub ? '👑 [自社傘下] ' : '';
                    return `<option value="${c.id}" ${p.contracts[secKey] === c.id ? 'selected' : ''}>${prefix}${c.name.replace(/\[.*?\]\s*/, '')}</option>`;
                }).join('');

                let currentCo = companies.find(c => c.id === p.contracts[secKey]);
                let isOwned = currentCo && currentCo.parent === 'player';
                let totalCost = numStores * costPerStore;

                let costColor = isOwned ? 'var(--success)' : 'var(--danger)';

        </div>`;
            };

            // 🌐 グローバル・インフラ契約UI (保険の国別対応)
            let infraHtml = `
            <h3 style="border-bottom: 2px solid var(--border); padding-bottom: 10px; margin-top:30px;">

            <p style="font-size:12px; color:var(--text-mut); margin-bottom:15px; line-height:1.5;">
                店舗運営に必要なインフラ契約です。<b style="color:var(--danger);">契約先のAI企業に毎週巨額の費用が流れ、彼らの資金力を高めることになります。</b><br>
                契約先を子会社化（TOBで過半数取得）すれば、費用は自社グループ内に還流し実質ゼロになります。
            </p>
            <div class="grid-3" style="margin-bottom:30px;">
                ${buildSelect('logistics', '🚚', '物流・配送網', 100000)}
                ${buildSelect('it', '💻', 'ITシステム・POS', 50000)}
            `;

            // 🛡️ 保険セクションの構築（出店している国ごとにプルダウンを生成）
            if (typeof p.contracts.insurance !== 'object') p.contracts.insurance = {};
            const cMap = { 'TOKYO': 'JP', 'OSAKA': 'JP', 'USA': 'USA', 'CHINA': 'CHINA', 'UK': 'UK', 'KOREA': 'KOREA', 'AUSTRALIA': 'AUS', 'CANADA': 'CAN', 'FRANCE': 'FRA', 'GERMANY': 'GER', 'INDIA': 'IND' };
            let activeCountries = [...new Set(p.stores.map(s => cMap[s.regionKey]))];

            let insuranceHtml = activeCountries.map(country => {
                let insCos = companies.filter(c => c.sector === 'insurance' && c.country === country);
                let options = `<option value="">未契約 (ペナルティ:-¥5万/週)</option>` + insCos.map(c =>
                    `<option value="${c.id}" ${p.contracts.insurance[country] === c.id ? 'selected' : ''}>${c.name.replace(/\[.*?\]\s*/, '')}</option>`
                ).join('');
                return `<div class="flex-between" style="margin-bottom:8px; border-bottom:1px dashed var(--border); padding-bottom:5px;">
                    <span style="font-size:13px; font-weight:bold;">${country} 店舗群</span>
                    <select onchange="changeInsurance('${country}', this.value)" style="width:55%; padding:4px; font-size:12px; border-radius:4px; border:1px solid var(--border);">${options}</select>
                </div>`;
            }).join('');

            if (activeCountries.length === 0) insuranceHtml = '<div style="font-size:12px; color:var(--text-mut); text-align:center;">現在出店している店舗はありません</div>';

            infraHtml += `
                <div style="background:#f8fafc; border:1px solid var(--border); border-radius:8px; padding:15px;">
                    <div class="flex-between" style="margin-bottom:10px;">
                        <span style="font-weight:bold; color:var(--text-main);">🛡️ 損害保険 (国別契約)</span>
                        <span style="font-size:13px; font-weight:900; color:var(--danger);">-¥3万 / 週</span>
                    </div>
                    <div style="font-size:11px; color:var(--text-mut); margin-bottom:10px;">出店している国ごとに、現地の保険会社と契約する必要があります。</div>
                    <div>${insuranceHtml}</div>
                </div>
            </div>`;


            // 既存のR&Dセクションの前にインフラUIを挿入する
            let html = container.innerHTML;
            let rdIndex = html.indexOf('💡 イノベーション・ハブ・ラボ');
            if (rdIndex !== -1) {
                let insertPos = html.lastIndexOf('<h3', rdIndex);
                container.innerHTML = html.slice(0, insertPos) + infraHtml + html.slice(insertPos);
            } else {
                container.innerHTML += infraHtml;
            }
        };
        window.changeInsurance = function (country, val) {
            companies[0].contracts.insurance[country] = val;
            updateHQView();
        };

        // 3. 契約変更時の政治リスク（不満度上昇）ロジック
        window.changeContract = function (secKey, newCompanyId) {
            let p = companies[0];
            let oldCompanyId = p.contracts[secKey];
            let newCo = companies.find(c => c.id === newCompanyId);
            let oldCo = companies.find(c => c.id === oldCompanyId);

            if (oldCompanyId !== newCompanyId) {
                // 契約を打ち切られた企業はプレイヤーへの親密度(loyalty)が激減する
                if (oldCo && oldCo.id !== 'player' && oldCo.parent !== 'player') {
                    oldCo.loyalty = Math.max(0, (oldCo.loyalty || 50) - 30);
                    addLog(`【契約破棄】${oldCo.name.replace(/\[.*?\]\s*/, '')} はインフラ契約を打ち切られ、激怒しています！（買収や敵対行動のリスク増）`, 'alert', '政治');
                }
                p.contracts[secKey] = newCompanyId;
                addLog(`【契約締結】新たに ${newCo.name.replace(/\[.*?\]\s*/, '')} とインフラ契約を結びました。`, 'success', '経済');
                updateHQView();
            }
        };

        // 4. ターン進行時：資金をAI企業へ実際に還流させるフック

        // ⚖️ フェーズ 3：ガバナンスと「魔の四半期決算」

        // 1. 財務・方針タブの拡張（大株主・ガバナンスUIの追加）
        const originalRenderPortfolioForGov = window.renderPortfolio;
        window.renderPortfolio = function () {
            originalRenderPortfolioForGov(); // 既存の財務UIをまず描画
            let container = document.getElementById('view-company');
            if (!container) return;

            let p = companies[0];

            // トップ5株主の算出（5%以上保有している実質的支配者たち）
            let topShareholders = Object.keys(p.shareholders)
                .filter(id => id !== 'player' && p.shareholders[id] > 0)
                .map(id => ({ id, shares: p.shareholders[id] }))
                .sort((a, b) => b.shares - a.shares)
                .slice(0, 5);

            let govHtml = `
        <h3 style="border-bottom: 2px solid var(--border); padding-bottom: 10px; margin-top:30px;">
            ⚖️ 取締役会（大株主トップ5）
        </h3>
        <p style="font-size:12px; color:var(--text-mut); margin-bottom:15px;">彼らの「親密度」が下がると、経営要求を突きつけられたり、株の投げ売り（株価暴落）を引き起こすリスクが高まります。</p>
        <div style="background:var(--card-bg); border-radius:12px; border:1px solid var(--border); overflow:hidden; margin-bottom: 30px;">
    `;

            if (topShareholders.length === 0) {
                govHtml += `<div style="padding:20px; text-align:center; color:var(--text-mut);">現在、外部の大株主はいません。（経営権は完全に安定しています）</div>`;
            } else {
                topShareholders.forEach((sh, index) => {
                    let ai = companies.find(c => c.id === sh.id);
                    if (!ai) return;
                    let sharePct = ((sh.shares / p.shares) * 100).toFixed(1);
                    let loyalty = ai.loyalty || 50;
                    let loyaltyColor = loyalty >= 70 ? 'var(--success)' : (loyalty >= 40 ? 'var(--warning)' : 'var(--danger)');
                    let rank = index === 0 ? '👑 筆頭株主' : `第${index + 1}位`;

                    govHtml += `
                <div class="flex-between" style="padding:15px; border-bottom:1px solid var(--border);">
                    <div>
                        <div style="font-size:11px; font-weight:bold; color:var(--primary); margin-bottom:4px;">${rank} / ${sectors[ai.sector]?.n || '不明'}</div>
                        <div style="font-size:16px; font-weight:900;">${ai.name.replace(/\[.*?\]\s*/, '')}</div>
                    </div>
                    <div style="text-align:right;">
                        <div style="font-size:18px; font-weight:900;">${sharePct}%</div>
                        <div style="font-size:12px; font-weight:bold; color:${loyaltyColor}; background:#f8fafc; padding:2px 8px; border-radius:10px; display:inline-block; margin-top:4px;">親密度: ${loyalty}</div>
                    </div>
                </div>
            `;
                });
            }
            govHtml += `</div>`;

            container.insertAdjacentHTML('beforeend', govHtml);
        };

        // 2. 臨時株主総会イベント（四半期ごとの「理不尽な要求」）
        window.triggerShareholderMeeting = function () {
            let p = companies[0];
            if (!p.contracts) return; // インフラ契約が初期化されていなければスキップ

            // 発言権のある大株主（5%以上保有）からランダムに発議者を決める
            let activeShareholders = Object.keys(p.shareholders)
                .filter(id => id !== 'player' && p.shareholders[id] >= p.shares * 0.05)
                .map(id => ({ id, shares: p.shareholders[id] }))
                .sort((a, b) => b.shares - a.shares);

            if (activeShareholders.length === 0) return;

            // トップ3の中から確率で発議者を決定（筆頭株主ほど意見を言いやすい）
            let agitatorData = activeShareholders[Math.floor(Math.random() * Math.min(3, activeShareholders.length))];
            let ai = companies.find(c => c.id === agitatorData.id);
            if (!ai) return;

            // 要求の内容を決定するAIロジック
            let demand = { type: 'dividend', val: Math.min(100, p.dividendRate + 15), text: `株主還元が足りない。配当性向を ${Math.min(100, p.dividendRate + 15)}% に引き上げろ` };

            // インフラ系企業なら「うちと契約しろ」と迫ってくる
            if (['logistics', 'it', 'insurance'].includes(ai.sector) && p.contracts[ai.sector] !== ai.id) {
                let secName = sectors[ai.sector].n;
                demand = { type: 'contract', val: ai.sector, text: `全店舗の「${secName}」の契約を、我が社に切り替えろ` };
            } else if (ai.personality === 'Monopolistic') {
                // 独占企業ならキャッシュを吐き出させる（ライバル買収を防ぐため）
                demand = { type: 'dividend', val: Math.min(100, p.dividendRate + 25), text: `余剰資金を溜め込みすぎだ。直ちに配当性向を ${Math.min(100, p.dividendRate + 25)}% にしろ` };
            } else if (ai.personality === 'Conservative' && p.debt > 0) {
                demand = { type: 'dividend', val: Math.max(0, p.dividendRate - 10), text: `借金があるのに経営が甘い。配当を減らして返済に回せ` };
            }

            // モーダル生成（ダークで緊迫感のあるUI）
            let modalsArea = document.getElementById('modals-area');

            if (modal) modal.remove();

            modalsArea.insertAdjacentHTML('beforeend', `
