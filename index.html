            <div class="modal-content" style="max-width: 500px; border-top: 8px solid var(--danger); background: #0f172a; color: #fff; box-shadow: 0 25px 50px -12px rgba(239, 68, 68, 0.25);">
                <div style="text-align:center; margin-bottom:20px;">
                    <div style="font-size:48px; margin-bottom:10px;">⚖️</div>
                    <div style="font-size:14px; font-weight:bold; color:var(--danger); letter-spacing:2px;">四半期 株主総会 / 経営要求</div>
                    <h3 style="margin:5px 0 0 0; font-size:24px;">大株主からの動議</h3>
                </div>
                
                <div style="background: rgba(255,255,255,0.05); padding:20px; border-radius:12px; margin-bottom:20px; border:1px solid rgba(255,255,255,0.1);">
                    <div style="font-size:12px; color:#cbd5e1; margin-bottom:5px;">発議者: 大株主 (${((agitatorData.shares / p.shares) * 100).toFixed(1)}%保有)</div>
                    <div style="font-size:22px; font-weight:900; color:var(--warning); margin-bottom:15px;">${ai.name.replace(/\[.*?\]\s*/, '')}</div>
                    <div style="font-size:16px; font-weight:bold; line-height:1.6; padding:15px; background:#000; border-left:4px solid var(--warning); border-radius:6px;">
                        「${demand.text}」
                    </div>
                </div>

                <p style="font-size:13px; color:#94a3b8; margin-bottom:20px; line-height:1.5;">
                    ※ 要求を拒否した場合、大株主の親密度が急落し、<strong style="color:var(--danger);">持ち株の投げ売り（株価暴落）</strong>や敵対的TOBの引き金になる可能性があります。
                </p>

                <div style="display:flex; gap:10px;">
                    <button class="btn-primary" style="flex:1; background:#059669; padding:15px; border-radius:8px;" onclick="resolveMeeting('${ai.id}', '${demand.type}', '${demand.val}', true)">✅ 要求を飲む (親密度UP)</button>
                    <button class="btn-outline" style="flex:1; border-color:#ef4444; color:#ef4444; padding:15px; border-radius:8px;" onclick="resolveMeeting('${ai.id}', '${demand.type}', '${demand.val}', false)">❌ 拒否する (親密度激減)</button>
                </div>
            </div>
        </div>
    `);
            document.getElementById('meeting-modal').style.display = 'flex';
        };

        // 3. 要求への回答と「報復ロジック（株の投げ売り）」
        window.resolveMeeting = function (aiId, type, val, accepted) {
            closeModal('meeting-modal');
            let p = companies[0];
            let ai = companies.find(c => c.id === aiId);

            if (accepted) {
                ai.loyalty = Math.min(100, (ai.loyalty || 50) + 20); // 親密度回復
                if (type === 'dividend') {
                    p.dividendRate = parseInt(val);
                    addLog(`【総会】${ai.name.replace(/\[.*?\]\s*/, '')} の要求を受け入れ、配当性向を ${val}% に変更しました。`, 'warning', '政治');
                } else if (type === 'contract') {
                    p.contracts[val] = ai.id;
                    addLog(`【総会】要求により、${sectors[val].n} の契約を ${ai.name.replace(/\[.*?\]\s*/, '')} に強制変更しました。`, 'warning', '政治');
                }
            } else {
                ai.loyalty = (ai.loyalty || 50) - 30; // 拒否すると激怒
                addLog(`【総会】${ai.name.replace(/\[.*?\]\s*/, '')} の要求を突っぱねました。相手は激怒しています！`, 'alert', '政治');

                // 🚨 報復ロジック：親密度が25以下の場合、60%の確率で株を投げ売りする
                if (ai.loyalty <= 25 && Math.random() < 0.6) {
                    setTimeout(() => {
                        let dumpShares = Math.floor(p.shareholders[ai.id] * 0.5); // 保有株の半分を市場にぶん投げる
                        if (dumpShares > 0) {
                            p.shareholders[ai.id] -= dumpShares;
                            let oldPrice = p.stockPrice;
                            p.stockPrice = Math.max(10, Math.floor(p.stockPrice * 0.7)); // 株価が30%強制暴落
                            ai.cash += dumpShares * p.stockPrice; // 投売り価格でAIは現金化

                            showMarketAlert("📉 大株主による投げ売り！", "自社株の大暴落", `
                        <b style="color:var(--danger);">${ai.name.replace(/\[.*?\]\s*/, '')}</b> が総会での要求拒否に反発し、保有する自社株 <b>${dumpShares.toLocaleString()} 株</b> を市場に大量放出しました！<br><br>
                        これにより自社の株価が <b style="font-size:18px;">¥${oldPrice.toLocaleString()} ➡️ ¥${p.stockPrice.toLocaleString()}</b> に大暴落しました。<br><br>
                        市場に大量の浮動株が出回ったため、他のAI企業から敵対的TOB（買収）を狙われる危険性が極めて高まっています！
                    `, "alert");

                            if (window.stockPriceHistory) {
                                window.stockPriceHistory[window.stockPriceHistory.length - 1] = p.stockPrice;
                                if (typeof updateCharts === 'function') updateCharts();
                            }
                            updateDashboard();
                        }
                    }, 1500); // 総会を閉じた1.5秒後に不意打ちで暴落
                }
            }

            updateDashboard();
            if (document.getElementById('view-company').classList.contains('active')) renderPortfolio();
            if (document.getElementById('view-hq').classList.contains('active')) updateHQView();
        };

        // 4. ターン進行処理のパッチ（四半期ごとに総会をフック）

        // ==========================================
        // ⚔️ フェーズ 4：TOBプロセスの高度化（大株主承認 ＆ ホワイトナイト）
        // ==========================================

        // 1. 既存の declareTOB を「取締役会システム」へ上書きパッチ
        window.declareTOB = function () {
            let c = companies.find(x => x.id === window.tradingCompanyId), p = companies[0];
            if (c.parent === 'player') return alert("すでに自社の子会社です。");
            if (c.id === 'player') return;

            let premiumPrice = Math.floor(c.stockPrice * 1.3), targetShares = Math.floor(c.shares * 0.51) + 1;
            let sharesToBuy = Math.max(0, targetShares - (c.shareholders['player'] || 0));

            if (sharesToBuy === 0) {
                c.parent = 'player';
                c.name = `[自社傘下] ${c.name.replace(/\[.*?\]\s*/, '')}`;
                addLog(`【買収完了】${c.name.replace(/\[.*?\]\s*/, '')} を子会社化しました！`, 'success', 'M&A');
                closeModal('trade-modal'); updateDashboard(); return;
            }

            let totalCost = premiumPrice * sharesToBuy;
            if (p.cash < totalCost) return alert(`予想買収総額（約 ¥${(totalCost / 10000).toLocaleString()}万）に対して手元資金が不足しています。`);

            // 取引モーダルを閉じて、取締役会（承認）モーダルを開く
            closeModal('trade-modal');
            openBoardApprovalModal(c.id, premiumPrice, sharesToBuy, totalCost);
        };

        // 2. 取締役会（大株主によるTOB承認）モーダル
        window.openBoardApprovalModal = function (targetId, price, sharesToBuy, totalCost) {
            let p = companies[0], target = companies.find(c => c.id === targetId);

            // 発言権のある大株主トップ5の抽出
            let voters = Object.keys(p.shareholders)
                .filter(id => p.shareholders[id] > 0)
                .map(id => ({ id: id, shares: p.shareholders[id] }))
                .sort((a, b) => b.shares - a.shares)
                .slice(0, 5);

            let totalVotes = voters.reduce((s, v) => s + v.shares, 0);
            let approveVotes = 0;

            let resultsHtml = '';
            voters.forEach(v => {
                let isPlayer = v.id === 'player';
                let ai = isPlayer ? null : companies.find(c => c.id === v.id);

                let isApprove = false;
                let reason = "";

                if (isPlayer) {
                    isApprove = true;
                    reason = "CEO提案";
                } else {
                    // 親密度と性格によるAI株主の判断ロジック
                    let baseProb = (ai.loyalty || 50) / 100;
                    if (ai.personality === 'Conservative') { baseProb -= 0.3; reason = "「リスクが大きすぎる」"; }
                    else if (ai.personality === 'Greedy') { baseProb += 0.2; reason = "「利益拡大の好機」"; }
                    else { reason = "「戦略的価値を評価」"; }

                    if (totalCost > p.cash * 0.8) { baseProb -= 0.4; reason = "「手元資金が枯渇する」"; } // 資金ギリギリだと反対しやすい

                    isApprove = Math.random() < baseProb;
                    if (!isApprove && !reason.includes("資金")) reason = "「CEOの独走は認めない」";
                }

                if (isApprove) approveVotes += v.shares;

                let name = isPlayer ? '👑 CEO (あなた)' : ai.name.replace(/\[.*?\]\s*/, '');
                let mark = isApprove ? '<span style="color:var(--success); font-weight:bold;">✅ 賛成</span>' : '<span style="color:var(--danger); font-weight:bold;">❌ 反対</span>';

                resultsHtml += `
            <div class="flex-between" style="padding:12px; border-bottom:1px solid rgba(255,255,255,0.1);">
                <div>
                    <div style="font-weight:bold;">${name} <span style="font-size:11px; color:#94a3b8;">(${((v.shares / p.shares) * 100).toFixed(1)}%)</span></div>
                    <div style="font-size:11px; color:#64748b; margin-top:4px;">${isPlayer ? '' : '理由: ' + reason}</div>
                </div>
                <div style="font-size:16px;">${mark}</div>
            </div>`;
            });

            let isPassed = approveVotes > (totalVotes / 2);
            let resultColor = isPassed ? 'var(--success)' : 'var(--danger)';
            let resultTitle = isPassed ? '決議可決 (TOB承認)' : '決議否決 (TOB棄却)';

            let modalsArea = document.getElementById('modals-area');
            let modal = document.getElementById('board-approval-modal');
            if (modal) modal.remove();

            modalsArea.insertAdjacentHTML('beforeend', `
        <div id="board-approval-modal" class="modal-overlay" style="z-index: 10030; background: rgba(0,0,0,0.9);">
            <div class="modal-content" style="max-width: 550px; background: #0f172a; color: #fff; border: 1px solid ${resultColor}; box-shadow: 0 0 30px ${isPassed ? 'rgba(16,185,129,0.3)' : 'rgba(239,68,68,0.3)'};">
                <h3 style="margin-top:0; border-bottom: 2px solid rgba(255,255,255,0.1); padding-bottom: 10px; color:var(--text-sub);">⚖️ 臨時取締役会：買収承認プロセス</h3>
                
                <div style="text-align:center; padding:15px; margin-bottom:20px; background:rgba(255,255,255,0.05); border-radius:8px;">
                    <div style="font-size:13px; color:var(--text-mut); margin-bottom:5px;">買収対象</div>
                    <div style="font-size:20px; font-weight:900; color:var(--warning);">${target.name.replace(/\[.*?\]\s*/, '')}</div>
                    <div style="font-size:12px; margin-top:5px;">提示価格: ¥${price.toLocaleString()} / 総額: ¥${(totalCost / 10000).toLocaleString()}万</div>
                </div>

                <div style="background:#000; border-radius:8px; padding:10px; margin-bottom:20px;">
                    ${resultsHtml}
                </div>

                <div style="text-align:center; margin-bottom:25px;">
                    <div style="font-size:12px; color:var(--text-mut); margin-bottom:5px;">審議結果</div>
                    <div style="font-size:28px; font-weight:900; color:${resultColor}; letter-spacing:2px;">${resultTitle}</div>
                </div>

                ${isPassed
                    ? `<button class="btn-primary btn-large" style="background:#059669; width:100%;" onclick="startAdvancedTOB('${target.id}', ${price}, ${sharesToBuy})">🚀 TOB（公開買付）を市場に宣言する</button>`
                    : `<button class="btn-outline btn-large" style="border-color:var(--danger); color:var(--danger); width:100%;" onclick="closeModal('board-approval-modal')">撤退する（またはDESでの裏工作を検討する）</button>`}
            </div>
        </div>
    `);
            document.getElementById('board-approval-modal').style.display = 'flex';
        };

        // 3. TOBの開始（4週間のカウントダウン設定）
        window.startAdvancedTOB = function (targetId, price, sharesToBuy) {
            let target = companies.find(c => c.id === targetId);

            // 既存の activeTOB ではなく、高度化された activeTOB_v2 を使用
            target.activeTOB_v2 = {
                bidder: 'player',
                price: price,
                targetShares: sharesToBuy,
                startWeek: week,
                deadline: week + 4 // 🌟 期間を4週間に延長！
            };

            target.stockPrice = price; // 株価がプレミアム価格まで跳ね上がる

            addLog(`【TOB開始】${target.name.replace(/\[.*?\]\s*/, '')} に対して株式公開買付を宣言しました！（決着まで4週間）`, 'alert', 'M&A');
            closeModal('board-approval-modal');
            updateDashboard();
            if (document.getElementById('view-market').classList.contains('active')) updateMarket();
        };

        // 4. ターン進行処理のパッチ（ホワイトナイト乱入 ＆ TOB決着）

        // 5. ホワイトナイト乱入イベントのUIとロジック
        window.triggerWhiteKnightEvent = function (eventData) {
            let t = eventData.target;
            let k = eventData.knight;
            let counterPrice = Math.floor(eventData.currentPrice * 1.2); // 敵は20%高い価格を提示してくる
            let requiredAdditionalCash = (counterPrice * eventData.shares) - (eventData.currentPrice * eventData.shares);

            let modalsArea = document.getElementById('modals-area');
            let modal = document.getElementById('white-knight-modal');
            if (modal) modal.remove();

            modalsArea.insertAdjacentHTML('beforeend', `
        <div id="white-knight-modal" class="modal-overlay" style="z-index: 10040; backdrop-filter: blur(10px); background: rgba(220, 38, 38, 0.4);">
            <div class="modal-content" style="max-width: 500px; border: 4px solid var(--danger); background: #0f172a; color: #fff; box-shadow: 0 0 50px rgba(239, 68, 68, 0.8); animation: shake 0.5s;">
                <div style="text-align:center; margin-bottom:20px;">
                    <div style="font-size:48px; margin-bottom:10px;">🚨</div>
                    <div style="font-size:16px; font-weight:900; color:var(--danger); letter-spacing:2px;">緊急事態：対抗TOB発生</div>
                </div>
                
                <div style="background: #000; padding:20px; border-radius:12px; margin-bottom:20px; border-left: 6px solid var(--danger);">
                    <p style="font-size:14px; line-height:1.6; margin-top:0;">
                        現在買収を進めている <b>${t.name.replace(/\[.*?\]\s*/, '')}</b> に対し、<br>
                        資金力に物を言わせた <b style="color:var(--warning); font-size:16px;">${k.name.replace(/\[.*?\]\s*/, '')}</b> が<br>
                        <b style="color:var(--danger);">ホワイトナイト（友好的買収者）</b> として乱入してきました！
                    </p>
                    <div style="margin-top:15px; padding-top:15px; border-top:1px dashed #334155;">
                        <div class="flex-between" style="font-size:13px; color:#94a3b8; margin-bottom:5px;"><span>自社の提示価格</span> <span style="text-decoration:line-through;">¥${eventData.currentPrice.toLocaleString()}</span></div>
                        <div class="flex-between" style="font-size:16px; font-weight:bold;"><span>敵の提示価格</span> <span style="color:var(--danger);">¥${counterPrice.toLocaleString()}</span></div>
                    </div>
                </div>

                <p style="font-size:13px; color:#cbd5e1; margin-bottom:20px;">
                    敵の価格に追従（カウンター）して買収を続行するか、諦めて撤退するかを選んでください。
                </p>

                <div style="display:flex; flex-direction:column; gap:10px;">
                    <button class="btn-primary btn-large" style="background:var(--danger); box-shadow: 0 4px 15px rgba(239,68,68,0.5);" onclick="resolveWhiteKnight('${t.id}', '${k.id}', ${counterPrice}, true)">
                        💰 価格を ¥${counterPrice.toLocaleString()} に引き上げて徹底抗戦する
                    </button>
                    <button class="btn-outline btn-large" style="border-color:#64748b; color:#94a3b8;" onclick="resolveWhiteKnight('${t.id}', '${k.id}', ${counterPrice}, false)">
                        🏳️ 資金の無駄だ。買収を断念して撤退する
                    </button>
                </div>
            </div>
        </div>
        <style>@keyframes shake { 0% { transform: translateX(0); } 25% { transform: translateX(-10px); } 50% { transform: translateX(10px); } 75% { transform: translateX(-10px); } 100% { transform: translateX(0); } }</style>
    `);
            document.getElementById('white-knight-modal').style.display = 'flex';
        };

        window.resolveWhiteKnight = function (targetId, knightId, counterPrice, fightBack) {
            closeModal('white-knight-modal');
            let t = companies.find(c => c.id === targetId);
            let k = companies.find(c => c.id === knightId);
            let p = companies[0];

            if (!t || !t.activeTOB_v2) return;

            if (fightBack) {
                let newTotalCost = counterPrice * t.activeTOB_v2.targetShares;
                if (p.cash >= newTotalCost) {
                    // カウンター成功
                    t.activeTOB_v2.price = counterPrice;
                    t.stockPrice = counterPrice;
                    addLog(`【TOB攻防】価格を ¥${counterPrice.toLocaleString()} に引き上げ、${k.name.replace(/\[.*?\]\s*/, '')} を牽制しました！`, 'warning', 'M&A');
                } else {
                    alert(`手元資金が ¥${(newTotalCost / 10000).toLocaleString()}万 に満たないため、カウンターできません！強制撤退します。`);
                    fightBack = false;
                }
            }

            if (!fightBack) {
                // 撤退した場合、ホワイトナイトがTOBを引き継ぐ
                t.activeTOB_v2.bidder = knightId;
                t.activeTOB_v2.price = counterPrice;
                t.stockPrice = counterPrice;
                addLog(`【TOB敗北】自社は撤退し、${k.name.replace(/\[.*?\]\s*/, '')} が ${t.name.replace(/\[.*?\]\s*/, '')} の買収を引き継ぎました。`, 'alert', 'M&A');
            }

            updateDashboard();
            if (document.getElementById('view-market').classList.contains('active')) updateMarket();
        };
        // ==========================================
        // 🏛️ 専用リッチUI：大株主 投票・議決システム
        // ==========================================
        window.activeVotingQueue = [];

        // キューに溜まった議案を順番に表示するハブ関数
        window.processVotingQueue = function (onComplete) {
            if (window.activeVotingQueue.length === 0) {
                if (onComplete) onComplete();
                return;
            }
            let ev = window.activeVotingQueue.shift();
            openShareholderVotingModal(ev, () => {
                setTimeout(() => processVotingQueue(onComplete), 500); // 次の議案へ
            });
        };

        window.openShareholderVotingModal = function (eventData, onNext) {
            let targetCo = eventData.target;
            let proposer = eventData.proposerName;
            let title = eventData.title;
            let desc = eventData.desc;
            let playerStake = targetCo.shares > 0 ? (targetCo.shareholders['player'] || 0) / targetCo.shares : 0;
            let playerVotes = targetCo.shareholders['player'] || 0;

            // NPC大株主の票をシミュレーション
            let totalShares = targetCo.shares;
            let npcVotesFor = 0; let npcVotesAgainst = 0;

            Object.keys(targetCo.shareholders).forEach(id => {
                if (id !== 'player') {
                    let s = targetCo.shareholders[id];
                    if (s > totalShares * 0.03) { // 3%以上の大株主は自我を持つ
                        let pCo = companies.find(c => c.id === id);
                        let isFor = true;
                        // 提案がTOB防衛なら、強欲な会社は買収賛成(防衛反対)、保守は防衛賛成
                        if (eventData.type === 'tob_defense') {
                            isFor = pCo && pCo.personality === 'Greedy' ? false : true;
                        } else {
                            isFor = Math.random() > 0.4;
                        }
                        if (isFor) npcVotesFor += s; else npcVotesAgainst += s;
                    }
                }
            });

            // 一般投資家(残り)は半々に割れる
            let publicShares = totalShares - (playerVotes + npcVotesFor + npcVotesAgainst);
            npcVotesFor += Math.floor(publicShares * 0.5);
            npcVotesAgainst += Math.ceil(publicShares * 0.5);

            let modalsArea = document.getElementById('modals-area');
            let modalHtml = `
                <div id="voting-modal" class="modal-overlay" style="display:flex; z-index:99999; background:rgba(0,0,0,0.85); backdrop-filter:blur(15px);">
                    <div class="modal-content" style="max-width:600px; padding:0; overflow:hidden; border:1px solid #334155; box-shadow:0 25px 50px -12px rgba(0,0,0,0.5);">
                        <div style="background:linear-gradient(135deg, #1e293b, #0f172a); color:#fff; padding:25px; text-align:center; border-bottom:4px solid ${eventData.type === 'tob_defense' ? 'var(--danger)' : 'var(--primary)'};">
                            <div style="font-size:12px; color:#94a3b8; font-weight:900; letter-spacing:3px; margin-bottom:5px;">🏛️ SHAREHOLDER MEETING</div>
                            <h2 style="margin:0; font-size:24px; font-weight:900;">${targetCo.name.replace(/\[.*?\]\s*/, '')} 臨時株主総会</h2>
                        </div>
                        <div style="padding:30px;">
                            <div style="background:#f8fafc; border-left:6px solid ${eventData.type === 'tob_defense' ? 'var(--danger)' : 'var(--primary)'}; padding:20px; border-radius:8px; margin-bottom:25px;">
                                <div style="font-size:13px; color:var(--text-mut); font-weight:bold; margin-bottom:8px;">📄 第1号議案 (提案者: ${proposer})</div>
                                <div style="font-size:18px; font-weight:900; color:var(--text-main); margin-bottom:10px;">${title}</div>
                                <div style="font-size:14px; color:var(--text-mut); line-height:1.6;">${desc}</div>
                            </div>
                            
                            <div style="text-align:center; margin-bottom:20px;">
                                <div style="font-size:12px; color:var(--text-mut); font-weight:bold; margin-bottom:5px;">👑 あなたの保有議決権</div>
                                <div style="font-size:24px; font-weight:900; color:var(--primary);">${playerVotes.toLocaleString()} 票 <span style="font-size:14px; color:var(--text-mut);">(${(playerStake * 100).toFixed(1)}%)</span></div>
                            </div>

                            <div style="display:flex; gap:15px; margin-bottom:10px;">
                                <button id="btn-vote-yes" class="btn-primary btn-large" style="flex:1; background:var(--success); font-size:18px; padding:20px;">⭕ 賛成に投票</button>
                                <button id="btn-vote-no" class="btn-primary btn-large" style="flex:1; background:var(--danger); font-size:18px; padding:20px;">❌ 反対に投票</button>
                            </div>
                            <div id="voting-result-area" style="display:none; text-align:center; padding:20px; border-top:1px dashed var(--border); margin-top:20px;">
                                <h3 id="voting-final-text" style="font-size:22px; font-weight:900; margin-bottom:15px;"></h3>
                                <div style="display:flex; height:20px; border-radius:10px; overflow:hidden; background:#e2e8f0; margin-bottom:10px;">
                                    <div id="bar-yes" style="height:100%; background:var(--success); width:0%; transition:width 1s cubic-bezier(0.16, 1, 0.3, 1);"></div>
                                    <div id="bar-no" style="height:100%; background:var(--danger); width:0%; transition:width 1s cubic-bezier(0.16, 1, 0.3, 1);"></div>
                                </div>
                                <div class="flex-between" style="font-size:12px; font-weight:bold;">
                                    <span style="color:var(--success);">賛成: <span id="text-yes"></span>票</span>
                                    <span style="color:var(--danger);">反対: <span id="text-no"></span>票</span>
                                </div>
                                <button class="btn-outline btn-large" style="margin-top:25px;" onclick="document.getElementById('voting-modal').remove(); ${eventData.callbackName}()">確認して次の議題へ</button>
                            </div>
                        </div>
                    </div>
                </div>
            `;
            modalsArea.insertAdjacentHTML('beforeend', modalHtml);

            let execVote = (playerIsYes) => {
                document.getElementById('btn-vote-yes').style.display = 'none';
                document.getElementById('btn-vote-no').style.display = 'none';
                document.getElementById('voting-result-area').style.display = 'block';

                let finalYes = npcVotesFor + (playerIsYes ? playerVotes : 0);
                let finalNo = npcVotesAgainst + (!playerIsYes ? playerVotes : 0);
                let total = finalYes + finalNo;
                let yesPct = (finalYes / total) * 100;

                setTimeout(() => {
                    document.getElementById('bar-yes').style.width = yesPct + '%';
                    document.getElementById('bar-no').style.width = (100 - yesPct) + '%';
                    document.getElementById('text-yes').innerText = finalYes.toLocaleString();
                    document.getElementById('text-no').innerText = finalNo.toLocaleString();

                    let isPassed = yesPct >= 50;
                    let resultTextEl = document.getElementById('voting-final-text');
                    resultTextEl.innerText = isPassed ? "⭕ 議案は【可決】されました" : "❌ 議案は【否決】されました";
                    resultTextEl.style.color = isPassed ? "var(--success)" : "var(--danger)";

                    // 結果をイベントデータに記録して発火
                    eventData.onVoted(isPassed);
                }, 100);
            };

            window.currentVoteCallback = onNext;
            eventData.callbackName = "window.currentVoteCallback";

            document.getElementById('btn-vote-yes').onclick = () => execVote(true);
            document.getElementById('btn-vote-no').onclick = () => execVote(false);
        };
    </script>
</body>

</html>
